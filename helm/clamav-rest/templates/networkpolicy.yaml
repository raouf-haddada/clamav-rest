{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clamav-rest.fullname" . }}-default-deny
  labels:
    {{- include "clamav-rest.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

{{- if .Values.metrics.serviceMonitor.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clamav-rest.fullname" . }}-allow-prometheus
  labels:
    {{- include "clamav-rest.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clamav-rest.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.prometheusNamespaceSelector | nindent 12 }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.prometheusPodSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.config.port }}
        {{- if .Values.tls.enabled }}
        - protocol: TCP
          port: {{ .Values.config.sslPort }}
        {{- end }}
{{- end }}
  {{- end }}
