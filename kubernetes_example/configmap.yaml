---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clamav-rest-config
  namespace: clamav-rest
data:
  MAX_FILE_SIZE: '100M'
  # optional: custom freshclam.conf for the ClamAV signature updater
  # When provided, all freshclam-related environment variables (SIGNATURE_CHECKS,
  # PROXY_SERVER, etc.) are ignored in favor of this file.
  # freshclam.conf: |
  #   Foreground yes
  #   DatabaseDirectory /clamav/data
  #   NotifyClamd /clamav/etc/clamd.conf
  #   Checks 2
  #   DatabaseMirror database.clamav.net